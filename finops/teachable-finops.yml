name: Teachable FinOps
description: >
  FinOps Framework 1.0 FOCUS-aligned cost and usage model for Teachable
  API consumption. Teachable charges flat monthly or annual subscription
  fees per plan tier, with an additional 7.5% transaction fee on the
  Starter plan. API usage is capped per plan (10,000 req/mo on Growth,
  25,000 on Advanced) and does not incur per-request overage charges;
  exceeding limits requires upgrading to the next plan tier.
specificationVersion: '1.0'
url: https://teachable.com/pricing
provider: Teachable
billingModel: subscription
currency: USD
costCategories:
  - name: Platform Subscription
    description: >
      Flat monthly or annual fee for the chosen Teachable plan. Covers
      access to the platform, API, webhooks, video hosting, and student
      capacity up to plan limits.
    type: fixed
    billingCycle: monthly
    tiers:
      - name: Starter Monthly
        unitPrice: 39.00
        unit: month
      - name: Starter Annual
        unitPrice: 29.00
        unit: month
        commitment: annual
      - name: Builder Monthly
        unitPrice: 89.00
        unit: month
      - name: Builder Annual
        unitPrice: 69.00
        unit: month
        commitment: annual
      - name: Growth Monthly
        unitPrice: 189.00
        unit: month
      - name: Growth Annual
        unitPrice: 139.00
        unit: month
        commitment: annual
      - name: Advanced Monthly
        unitPrice: 399.00
        unit: month
      - name: Advanced Annual
        unitPrice: 309.00
        unit: month
        commitment: annual
      - name: Unlimited
        unitPrice: null
        unit: custom
        notes: Contact sales for pricing
  - name: Transaction Fees
    description: >
      Platform transaction fee applied to every sale processed through
      Teachable on the Starter plan. Builder and above pay 0% platform
      transaction fees. Note: payment processor fees (Stripe 2.9% + $0.30
      or PayPal 3.49% + $0.49) apply to all plans.
    type: variable
    basis: revenue
    tiers:
      - plan: Starter
        rate: '7.5%'
        appliesTo: gross sale amount
      - plan: Builder
        rate: '0%'
      - plan: Growth
        rate: '0%'
      - plan: Advanced
        rate: '0%'
      - plan: Unlimited
        rate: '0%'
  - name: Payment Processor Fees
    description: >
      Third-party payment processor fees paid to Stripe or PayPal on all
      transactions, regardless of Teachable plan. These are pass-through
      costs not collected by Teachable.
    type: variable
    basis: transaction
    processors:
      - name: Stripe
        rate: '2.9%'
        fixedFee: 0.30
        currency: USD
      - name: PayPal
        rate: '3.49%'
        fixedFee: 0.49
        currency: USD
costOptimization:
  - recommendation: Annual commitment discount
    description: >
      Switch from monthly to annual billing to save approximately 26-30%
      on the subscription fee across all plan tiers.
    savingsEstimate: '26-30%'
  - recommendation: Right-size API request quota
    description: >
      Monitor monthly API request consumption via the Teachable admin
      dashboard. If consistently below 10,000 requests/month, Growth plan
      is sufficient. Only upgrade to Advanced (25,000 req/mo) if Growth
      quota is regularly exhausted.
  - recommendation: Eliminate Starter transaction fees
    description: >
      If monthly revenue makes the 7.5% Starter transaction fee exceed the
      cost difference between Starter ($39) and Builder ($89), upgrading
      to Builder eliminates transaction fees and reduces total cost of
      ownership.
    breakEvenRevenue: 667
    breakEvenCurrency: USD
    breakEvenPeriod: month
    notes: >
      At $667/month in sales, the 7.5% Starter fee ($50) exceeds the
      $50/month price difference between Starter and Builder plans.
usage:
  apiRequestTracking:
    description: >
      API request usage counts toward monthly quota per plan. Track
      consumption to avoid hitting plan limits, which return HTTP 429
      errors. Contact apisupport@teachable.com for quota increases.
    quotas:
      - plan: Growth
        monthlyRequests: 10000
      - plan: Advanced
        monthlyRequests: 25000
      - plan: Unlimited
        monthlyRequests: custom
