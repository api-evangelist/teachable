description: >
  Teachable is an online course and coaching platform that empowers creators to
  build and sell educational content without technical expertise. The Teachable
  REST API provides programmatic access to school management capabilities
  including course management, user enrollment, quiz responses, and sales
  transaction data. The API supports two authentication patterns: a server-side
  Admin API using API keys and an OAuth API for third-party application
  integrations. API access is available on Growth and Advanced plans, with
  webhook support for event-driven workflows covering enrollment, lecture
  completion, sales, and user lifecycle events.
